name: Build miaomiaowu apk (all archs)

on:
  workflow_dispatch:
    inputs:
      mmw_ref:
        description: '要构建的 miaomiaowu 源码 tag/branch/commit'
        required: true
        default: 'main'
      version:
        description: 'apk 包版本号（建议 x.y.z-rN 格式，例如 1.0.0-r1）'
        required: true
        default: '1.0.0-r1'
      changelog:
        description: '本次更新日志（可选，留空则自动生成）'
        required: false
        default: ''
  push:
    tags:
      - 'v*'

env:
  # 使用 25.12.0 版本的 ImageBuilder 提取 host apk 工具
  IMAGEBUILDER_URL: https://downloads.openwrt.org/releases/25.12.0/targets/x86/64/openwrt-imagebuilder-25.12.0-x86-64.Linux-x86_64.tar.zst

jobs:
  validate-version:
    name: 校验版本号格式（apk mkpkg 对格式要求很严格）
    runs-on: ubuntu-latest
    steps:
      - name: 检查
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "待校验版本号: $VERSION"
          # apk-tools（Alpine 风格）合法版本号: 数字(.数字)*，可选 -r数字 修订号后缀
          # 例如合法: 1.0.0  1.0.0-r1  1.2.3-r10
          # 例如非法: v1.0.0（多了v）  1.0.0-beta（apk不认hyphen后缀，必须写成 1.0.0_beta1）
          if ! echo "$VERSION" | grep -qE '^[0-9]+(\.[0-9]+)*(-r[0-9]+)?$'; then
            echo "::error::版本号 '$VERSION' 不符合 apk-tools 要求的格式。"
            echo "::error::只能是纯数字加点(如 1.0.0)，可选加 -r数字 修订号(如 1.0.0-r1)。"
            echo "::error::不能带前缀 v、不能用 -beta/-rc 这种连字符后缀（apk 要求用下划线，如 1.0.0_rc1）。"
            exit 1
          fi
          echo "版本号格式合法"

  fetch-apk-tool:
    name: 提取 host apk 工具
    needs: validate-version
    runs-on: ubuntu-latest
    steps:
      - name: 下载 OpenWrt ImageBuilder 并提取 apk 二进制及依赖库
        run: |
          sudo apt-get update && sudo apt-get install -y zstd
          wget -q "$IMAGEBUILDER_URL" -O ib.tar.zst
          mkdir ib
          tar --use-compress-program=unzstd -xf ib.tar.zst -C ib --strip-components=1
          mkdir -p apk-tool
          # 同时复制 bin 和 lib 目录，保证 apk 能找到相对路径下的动态链接器
          cp -r ib/staging_dir/host/bin ib/staging_dir/host/lib apk-tool/
          chmod -R +x apk-tool
          ./apk-tool/bin/apk --version

      - name: 将 apk-tool 打包为 tar.gz 以完美保留所有隐藏文件、软链接和权限
        run: |
          tar -czf apk-tool.tar.gz apk-tool

      - name: 上传 apk 工具压缩包 artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-tool-tar
          path: apk-tool.tar.gz

  build:
    name: Build ${{ matrix.target }}
    needs: fetch-apk-tool
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [arm64, armv7, armv6, armv5, amd64, x86, riscv64]
    steps:
      - name: Checkout 打包仓库（本仓库）
        uses: actions/checkout@v4
        with:
          path: pkg-repo

      - name: Checkout miaomiaowu 源码
        uses: actions/checkout@v4
        with:
          repository: iluobei/miaomiaowu
          ref: ${{ github.event.inputs.mmw_ref || 'main' }}
          path: miaomiaowu-src

      - name: 下载 apk 工具压缩包
        uses: actions/download-artifact@v4
        with:
          name: apk-tool-tar
          path: .

      - name: 解压 apk 工具（完美还原权限与隐藏文件）
        run: |
          tar -xzf apk-tool.tar.gz
          ./apk-tool/bin/apk --version

      - name: 安装 fakeroot（apk mkpkg 打包需要用它伪装 root 属主）
        run: sudo apt-get update && sudo apt-get install -y fakeroot

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 构建前端
        working-directory: miaomiaowu-src/miaomiaowu
        run: |
          npm ci
          npm run build

      - name: 交叉编译后端
        working-directory: miaomiaowu-src
        run: |
          source "$GITHUB_WORKSPACE/pkg-repo/scripts/arch-map.sh"
          IFS=',' read -r GOOS_V GOARCH_V GOARM_V GOMIPS_V <<< "${GO_TARGETS[${{ matrix.target }}]}"

          export CGO_ENABLED=0
          export GOOS="$GOOS_V"
          export GOARCH="$GOARCH_V"
          [ "$GOARM_V" != "-" ] && export GOARM="$GOARM_V"
          [ "$GOMIPS_V" != "-" ] && export GOMIPS="$GOMIPS_V"

          echo "编译目标: GOOS=$GOOS GOARCH=$GOARCH GOARM=${GOARM:-} GOMIPS=${GOMIPS:-}"
          go build -trimpath -ldflags="-s -w" -o "$GITHUB_WORKSPACE/mmw-bin" ./cmd/server

      - name: 写入签名私钥
        run: |
          echo "${{ secrets.APK_SIGN_KEY }}" > sign-key.pem

      - name: 为该 go-target 覆盖的所有 apk 架构打包
        run: |
          cd pkg-repo
          chmod +x scripts/build-apk.sh
          source scripts/arch-map.sh

          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"

          for OPKG_ARCH in ${OPKG_ARCHES[${{ matrix.target }}]}; do
            ./scripts/build-apk.sh "$GITHUB_WORKSPACE/apk-tool/bin/apk" "$GITHUB_WORKSPACE/mmw-bin" "$OPKG_ARCH" "$VERSION" "$GITHUB_WORKSPACE/dist" "$GITHUB_WORKSPACE/sign-key.pem"
          done

      - name: 上传 artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.target }}
          path: dist

  build-luci:
    name: Build luci-app-miaomiaowu (arch=all)
    needs: fetch-apk-tool
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 打包仓库
        uses: actions/checkout@v4

      - name: 下载 apk 工具压缩包
        uses: actions/download-artifact@v4
        with:
          name: apk-tool-tar
          path: .

      - name: 解压 apk 工具（完美还原权限与隐藏文件）
        run: |
          tar -xzf apk-tool.tar.gz
          ./apk-tool/bin/apk --version

      - name: 安装 fakeroot
        run: sudo apt-get update && sudo apt-get install -y fakeroot

      - name: 写入签名私钥
        run: |
          echo "${{ secrets.APK_SIGN_KEY }}" > sign-key.pem

      - name: 打包 LuCI 前端 apk
        run: |
          chmod +x scripts/build-luci-apk.sh
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          ./scripts/build-luci-apk.sh "$GITHUB_WORKSPACE/apk-tool/bin/apk" "$VERSION" "$GITHUB_WORKSPACE/dist" "$GITHUB_WORKSPACE/sign-key.pem"

      - name: 上传 artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-luci-all
          path: dist

  index-and-release:
    name: 生成签名索引并发布
    needs: [build, build-luci]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout 打包仓库
        uses: actions/checkout@v4

      - name: 下载 apk 工具压缩包
        uses: actions/download-artifact@v4
        with:
          name: apk-tool-tar
          path: .

      - name: 解压 apk 工具（完美还原权限与隐藏文件）
        run: |
          tar -xzf apk-tool.tar.gz
          ./apk-tool/bin/apk --version

      - name: 合并各架构产物（此时是扁平文件，架构信息还在文件名里）
        uses: actions/download-artifact@v4
        with:
          pattern: apk-*
          path: flat
          merge-multiple: true

      - name: 生成公钥
        run: |
          echo "${{ secrets.APK_SIGN_KEY }}" > sign-key.pem
          mkdir -p keys
          openssl ec -in sign-key.pem -pubout > keys/miaomiaowu-apk.pem

      - name: 按架构归类 apk 文件
        run: |
          set -e
          LUCI_APK=$(ls flat/luci-app-miaomiaowu_*_all.apk | head -n1)
          [ -z "$LUCI_APK" ] && { echo "错误: 没找到 luci-app-miaomiaowu 的 apk" >&2; exit 1; }
          LUCI_BASENAME=$(basename "$LUCI_APK" .apk)
          VERSION="${LUCI_BASENAME#luci-app-miaomiaowu_}"
          VERSION="${VERSION%_all}"
          echo "识别到版本号: $VERSION"

          mkdir -p repo
          for BIN_APK in flat/miaomiaowu_"${VERSION}"_*.apk; do
            [ -e "$BIN_APK" ] || continue
            BIN_BASENAME=$(basename "$BIN_APK" .apk)
            ARCH="${BIN_BASENAME#miaomiaowu_${VERSION}_}"
            [ -z "$ARCH" ] && { echo "警告: 无法识别 $BIN_APK 的架构，跳过" >&2; continue; }
            mkdir -p "repo/$ARCH"
            cp "$BIN_APK" "repo/$ARCH/"
            cp "$LUCI_APK" "repo/$ARCH/"
          done

      - name: 按架构生成签名索引
        run: |
          chmod +x scripts/build-apk-index.sh
          for d in repo/*/; do
            ./scripts/build-apk-index.sh "$GITHUB_WORKSPACE/apk-tool/bin/apk" "$GITHUB_WORKSPACE/sign-key.pem" "$GITHUB_WORKSPACE/keys" "$d"
          done

      - name: 汇总所有 apk 文件用于 Release 附件
        run: |
          mkdir -p release-files
          find repo -name '*.apk' -exec cp {} release-files/ \;
          cp keys/miaomiaowu-apk.pem release-files/
          cd release-files && sha256sum *.apk > checksums.txt

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          # 加 -apk 后缀，与 ipk 的 release 区分开；deploy.yml 靠这个后缀识别最新的 apk 产物
          tag_name: ${{ github.event.inputs.version && format('v{0}-apk', github.event.inputs.version) || format('{0}-apk', github.ref_name) }}
          name: ${{ github.event.inputs.version && format('v{0}-apk', github.event.inputs.version) || format('{0}-apk', github.ref_name) }}
          body: ${{ github.event.inputs.changelog }}
          generate_release_notes: ${{ github.event.inputs.changelog == '' }}
          files: |
            release-files/*.apk
            release-files/miaomiaowu-apk.pem
            release-files/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
