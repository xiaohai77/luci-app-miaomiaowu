name: 妙妙屋-自动all

# 每 6 小时检测一次上游 iluobei/miaomiaowu 是否有新 Release。
# ipk、apk 并发触发打包，互不阻塞——其中一个失败不影响另一个继续跑完；
# 只要至少有一个成功，就触发 Cloudflare 部署（deploy.yml 本身会跳过没产出的那部分）。
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: '强制触发一次打包，即使版本号没变化'
        type: boolean
        required: false
        default: false

permissions:
  contents: read
  actions: write

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
    steps:
      - name: 获取上游最新 Release
        id: upstream
        run: |
          set -e
          JSON=$(gh api repos/iluobei/miaomiaowu/releases/latest)
          TAG=$(echo "$JSON" | jq -r '.tag_name')
          BODY=$(echo "$JSON" | jq -r '.body')

          if [ -z "$TAG" ] || [ "$TAG" == "null" ]; then
            echo "::error::没拿到上游最新 release，检查网络或上游仓库状态"
            exit 1
          fi

          RAW_VERSION="${TAG#v}"

          # ipk、apk 都直接用上游原始版本号，跟上游保持一致。
          IPK_VERSION="$RAW_VERSION"
          APK_VERSION="$RAW_VERSION"

          echo "上游最新版本: $TAG"
          echo "ipk 版本号: $IPK_VERSION"
          echo "apk 版本号: $APK_VERSION"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "ipk_version=$IPK_VERSION" >> "$GITHUB_OUTPUT"
          echo "apk_version=$APK_VERSION" >> "$GITHUB_OUTPUT"

          {
            echo "body<<MMW_EOF"
            echo "$BODY"
            echo "MMW_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: 精简更新日志（去掉加群/文档等无关内容）
        id: changelog
        run: |
          # 简单按关键词过滤掉"加群/文档/discord"这类跟版本内容无关的行，
          # 只是关键词粗筛，不是语义理解，过滤不干净可以自己再调关键词。
          {
            echo "clean<<MMW_EOF"
            echo "${{ steps.upstream.outputs.body }}" | grep -viE '交流群|加群|QQ群|微信群|文档地址|查看文档|使用文档|discussion|discord' || true
            echo "MMW_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: 检查本仓库是否已经打包过这个版本
        id: check
        run: |
          TAG="${{ steps.upstream.outputs.tag }}"
          COUNT=$(gh api "repos/${REPO}/releases" --jq "[.[] | select(.tag_name==\"$TAG\")] | length")
          echo "已存在同名 release 数量: $COUNT"
          if [ "$COUNT" -gt 0 ] && [ "${{ github.event.inputs.force }}" != "true" ]; then
            echo "already_built=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_built=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 并发触发 ipk 打包
        id: trigger_ipk
        if: steps.check.outputs.already_built == 'false'
        run: |
          BEFORE=$(gh run list --repo "$REPO" --workflow=build-ipk.yml --limit=1 --json databaseId --jq '.[0].databaseId // 0')
          gh workflow run build-ipk.yml \
            --repo "$REPO" \
            -f mmw_ref="${{ steps.upstream.outputs.tag }}" \
            -f version="${{ steps.upstream.outputs.ipk_version }}" \
            -f changelog="${{ steps.changelog.outputs.clean }}"

          RUN_ID=""
          for i in $(seq 1 30); do
            sleep 5
            NOW=$(gh run list --repo "$REPO" --workflow=build-ipk.yml --limit=1 --json databaseId --jq '.[0].databaseId // 0')
            if [ "$NOW" != "0" ] && [ "$NOW" != "$BEFORE" ]; then
              RUN_ID="$NOW"
              break
            fi
          done

          if [ -z "$RUN_ID" ]; then
            echo "::warning::没找到刚触发的 ipk 打包 run，后面等待环节会跳过它"
          fi
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: 并发触发 apk 打包
        id: trigger_apk
        if: steps.check.outputs.already_built == 'false'
        run: |
          BEFORE=$(gh run list --repo "$REPO" --workflow=build-apk.yml --limit=1 --json databaseId --jq '.[0].databaseId // 0')
          gh workflow run build-apk.yml \
            --repo "$REPO" \
            -f mmw_ref="${{ steps.upstream.outputs.tag }}" \
            -f version="${{ steps.upstream.outputs.apk_version }}" \
            -f changelog="${{ steps.changelog.outputs.clean }}"

          RUN_ID=""
          for i in $(seq 1 30); do
            sleep 5
            NOW=$(gh run list --repo "$REPO" --workflow=build-apk.yml --limit=1 --json databaseId --jq '.[0].databaseId // 0')
            if [ "$NOW" != "0" ] && [ "$NOW" != "$BEFORE" ]; then
              RUN_ID="$NOW"
              break
            fi
          done

          if [ -z "$RUN_ID" ]; then
            echo "::warning::没找到刚触发的 apk 打包 run，后面等待环节会跳过它"
          fi
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: 等待两个打包各自跑完（互不阻塞，谁先完成谁先记录结果）
        id: wait
        if: steps.check.outputs.already_built == 'false'
        timeout-minutes: 90
        run: |
          IPK_ID="${{ steps.trigger_ipk.outputs.run_id }}"
          APK_ID="${{ steps.trigger_apk.outputs.run_id }}"
          IPK_CONCLUSION=""
          APK_CONCLUSION=""

          while true; do
            if [ -n "$IPK_ID" ] && [ -z "$IPK_CONCLUSION" ]; then
              INFO=$(gh run view "$IPK_ID" --repo "$REPO" --json status,conclusion)
              if [ "$(echo "$INFO" | jq -r '.status')" == "completed" ]; then
                IPK_CONCLUSION=$(echo "$INFO" | jq -r '.conclusion')
                echo "ipk (run $IPK_ID) 完成，结果: $IPK_CONCLUSION"
              fi
            fi

            if [ -n "$APK_ID" ] && [ -z "$APK_CONCLUSION" ]; then
              INFO=$(gh run view "$APK_ID" --repo "$REPO" --json status,conclusion)
              if [ "$(echo "$INFO" | jq -r '.status')" == "completed" ]; then
                APK_CONCLUSION=$(echo "$INFO" | jq -r '.conclusion')
                echo "apk (run $APK_ID) 完成，结果: $APK_CONCLUSION"
              fi
            fi

            # 没拿到 run id 的那个直接当"跳过"处理，不无限等它
            [ -z "$IPK_ID" ] && IPK_CONCLUSION="skipped"
            [ -z "$APK_ID" ] && APK_CONCLUSION="skipped"

            if [ -n "$IPK_CONCLUSION" ] && [ -n "$APK_CONCLUSION" ]; then
              break
            fi
            echo "还在等待中，30 秒后再查..."
            sleep 30
          done

          echo "ipk_conclusion=$IPK_CONCLUSION" >> "$GITHUB_OUTPUT"
          echo "apk_conclusion=$APK_CONCLUSION" >> "$GITHUB_OUTPUT"

          if [ "$IPK_CONCLUSION" != "success" ]; then
            echo "::warning::ipk 打包未成功（结果: $IPK_CONCLUSION）"
          fi
          if [ "$APK_CONCLUSION" != "success" ]; then
            echo "::warning::apk 打包未成功（结果: $APK_CONCLUSION）"
          fi

      - name: 只要有一个成功，就触发 Cloudflare 部署
        if: >
          steps.check.outputs.already_built == 'false' &&
          (steps.wait.outputs.ipk_conclusion == 'success' || steps.wait.outputs.apk_conclusion == 'success')
        run: |
          gh workflow run deploy.yml --repo "$REPO"

      - name: 两个都没成功，跳过部署
        if: >
          steps.check.outputs.already_built == 'false' &&
          steps.wait.outputs.ipk_conclusion != 'success' &&
          steps.wait.outputs.apk_conclusion != 'success'
        run: |
          echo "::error::ipk 和 apk 都没打包成功，不触发部署，请去 Actions 页面看具体报错"
          exit 1

      - name: 无需更新
        if: steps.check.outputs.already_built == 'true'
        run: echo "上游版本 ${{ steps.upstream.outputs.tag }} 已经打包过，跳过。"
