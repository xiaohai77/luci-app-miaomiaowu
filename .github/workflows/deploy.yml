name: Deploy miaomiaowu Feed

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 wget zstd

      - name: Find latest IPK release tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh api repos/${{ github.repository }}/releases --jq '[.[] | select(.tag_name | endswith("-ipk"))] | sort_by(.created_at) | last | .tag_name')
          echo "IPK_TAG=$TAG" >> $GITHUB_ENV
          echo "Latest IPK tag: $TAG"

      - name: Find latest APK release tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh api repos/${{ github.repository }}/releases --jq '[.[] | select(.tag_name | endswith("-apk"))] | sort_by(.created_at) | last | .tag_name')
          echo "APK_TAG=$TAG" >> $GITHUB_ENV
          echo "Latest APK tag: $TAG"

      - name: Download IPK Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ipk-download
          if [ -n "${IPK_TAG}" ] && [ "${IPK_TAG}" != "null" ]; then
            gh release download "$IPK_TAG" \
              --pattern "*.ipk" \
              --dir ipk-download \
              --repo ${{ github.repository }} || true
          fi

      - name: Download APK Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p apk-download
          if [ -n "${APK_TAG}" ] && [ "${APK_TAG}" != "null" ]; then
            gh release download "$APK_TAG" \
              --pattern "*.apk" \
              --dir apk-download \
              --repo ${{ github.repository }} || true
          fi

      - name: Download OpenWrt SDK
        run: |
          wget -q "https://downloads.openwrt.org/releases/23.05.3/targets/x86/64/openwrt-sdk-23.05.3-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz" -O sdk-ipk.tar.xz
          tar -xf sdk-ipk.tar.xz
          mv openwrt-sdk-* sdk-ipk

          wget -q "https://downloads.openwrt.org/releases/25.12.4/targets/x86/64/openwrt-sdk-25.12.4-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst" -O sdk-apk.tar.zst
          tar --zstd -xf sdk-apk.tar.zst
          mv openwrt-sdk-* sdk-apk

      - name: Build IPK Feed
        run: |
          set -e
          sudo tee /usr/local/bin/sha256 >/dev/null << 'EOF'
          #!/bin/bash
          sha256sum "$1" | awk '{print $1}'
          EOF
          sudo chmod +x /usr/local/bin/sha256

          if ls ipk-download/*.ipk >/dev/null 2>&1; then
            echo "Building IPK repository..."
            echo "${{ secrets.MMW_IPK_SIGN_KEY }}" > /tmp/ipk-sign.key
            USIGN_BIN=$(find sdk-ipk -type f -name usign -path "*/host/bin/*" | head -n1)
            chmod +x scripts/build-ipk-repo.sh
            ./scripts/build-ipk-repo.sh \
              ipk-download \
              site \
              "$GITHUB_WORKSPACE/sdk-ipk/scripts/ipkg-make-index.sh" \
              "$GITHUB_WORKSPACE/$USIGN_BIN" \
              /tmp/ipk-sign.key
            shred -u /tmp/ipk-sign.key 2>/dev/null || rm -f /tmp/ipk-sign.key
            mkdir -p site
            cp keys/miaomiaowu-ipk.pub site/miaomiaowu-ipk.pub
            cp scripts/install.sh site/install.sh
            cp scripts/feed.sh site/feed.sh
            cp scripts/uninstall.sh site/uninstall.sh
          else
            echo "No IPK packages found. Skip."
          fi

      - name: Build APK Feed
        run: |
          set -e
          if ls apk-download/*.apk >/dev/null 2>&1; then
            echo "Building APK repository..."
            echo "${{ secrets.APK_SIGN_KEY }}" > /tmp/apk-sign.key
            openssl ec \
              -in /tmp/apk-sign.key \
              -pubout \
              -out site/miaomiaowu-apk.pem
            APK_BIN=$(find sdk-apk/staging_dir -type f -name apk -path "*/host/bin/*" | head -n1)
            mkdir -p /tmp/keys
            cp site/miaomiaowu-apk.pem /tmp/keys/

            LUCI_APK=$(ls apk-download/luci-app-miaomiaowu_*_all.apk 2>/dev/null | head -n1)
            if [ -z "$LUCI_APK" ]; then
              echo "警告: apk-download 里没有 luci-app-miaomiaowu，跳过 APK 软件源生成" >&2
            else
              LUCI_BASENAME=$(basename "$LUCI_APK" .apk)
              VERSION="${LUCI_BASENAME#luci-app-miaomiaowu_}"
              VERSION="${VERSION%_all}"
              echo "识别到 APK 版本号: $VERSION"

              mkdir -p site/openwrt-apk
              for BIN_APK in apk-download/miaomiaowu_"${VERSION}"_*.apk; do
                [ -e "$BIN_APK" ] || continue
                BIN_BASENAME=$(basename "$BIN_APK" .apk)
                ARCH="${BIN_BASENAME#miaomiaowu_${VERSION}_}"
                [ -z "$ARCH" ] && { echo "警告: 无法识别 $BIN_APK 的架构，跳过" >&2; continue; }
                mkdir -p "site/openwrt-apk/$ARCH"
                cp "$BIN_APK" "site/openwrt-apk/$ARCH/miaomiaowu-${VERSION}.apk"
                cp "$LUCI_APK" "site/openwrt-apk/$ARCH/luci-app-miaomiaowu-${VERSION}.apk"
                (
                  cd "site/openwrt-apk/$ARCH"
                  "$GITHUB_WORKSPACE/$APK_BIN" mkndx \
                    --keys-dir /tmp/keys \
                    --allow-untrusted \
                    --sign /tmp/apk-sign.key \
                    --output packages.adb \
                    *.apk
                )
                echo "已生成软件源: site/openwrt-apk/$ARCH"
              done
            fi
            shred -u /tmp/apk-sign.key 2>/dev/null || rm -f /tmp/apk-sign.key
          else
            echo "No APK packages found. Skip."
          fi

          mkdir -p site
          cp scripts/install.sh site/install.sh
          cp scripts/feed.sh site/feed.sh
          cp scripts/uninstall.sh site/uninstall.sh

      - name: Generate index.html
        run: |
          python3 << 'EOF'
          import os
          root = "site"
          html = [
              "<!DOCTYPE html>",
              "<html>",
              "<head>",
              "<meta charset='utf-8'>",
              "<title>miaomiaowu Feed</title>",
              "<style>",
              "body{font-family:monospace;background:#1e1e1e;color:#ddd;padding:20px;}",
              "a{color:#7ec9ff;text-decoration:none;}",
              "a:hover{text-decoration:underline;}",
              ".dir{color:#f0c674;font-weight:bold;}",
              "</style>",
              "</head>",
              "<body>",
              "<h1>miaomiaowu Feed</h1>",
              "<pre>"
          ]
          def walk(path, prefix=""):
              entries = sorted([e for e in os.listdir(path) if e not in ("index.html", "_headers")])
              for i, name in enumerate(entries):
                  full = os.path.join(path, name)
                  last = i == len(entries) - 1
                  branch = "└── " if last else "├── "
                  rel = os.path.relpath(full, root)
                  if os.path.isdir(full):
                      html.append(f"{prefix}{branch}<span class='dir'>{name}/</span>")
                      walk(full, prefix + ("    " if last else "│   "))
                  else:
                      html.append(f"{prefix}{branch}<a href='/{rel}'>{name}</a>")
          walk(root)
          html.extend(["</pre>", "</body>", "</html>"])
          with open(os.path.join(root, "index.html"), "w", encoding="utf-8") as f:
              f.write("\n".join(html))
          EOF

      - name: Generate no-cache headers
        run: |
          cat > site/_headers << 'EOF'
          /openwrt-ipk/*
            Cache-Control: no-cache, no-store, must-revalidate
          /openwrt-apk/*
            Cache-Control: no-cache, no-store, must-revalidate
          /*.pem
            Cache-Control: no-cache, no-store, must-revalidate
          /*.pub
            Cache-Control: no-cache, no-store, must-revalidate
          /install.sh
            Cache-Control: no-cache, no-store, must-revalidate
          /feed.sh
            Cache-Control: no-cache, no-store, must-revalidate
          /uninstall.sh
            Cache-Control: no-cache, no-store, must-revalidate
          /index.html
            Cache-Control: no-cache, no-store, must-revalidate
          EOF

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: miaomiaowu-openwrt
          directory: site
          branch: main
